<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />

    <meta name="theme-color" content="#284b63" />
    <title>Sin conexión · FamilyHQ</title>
    <style>
      :root { color-scheme: light; }

      html, body { height: 100%; margin: 0; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #284b63;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem 1.5rem;
        gap: 1rem;
      }
      img { width: 88px; height: 88px; border-radius: 20px; }
      h1 { font-size: 1.375rem; font-weight: 600; margin: 0.5rem 0 0; }
      p { margin: 0; max-width: 22rem; color: rgba(255, 255, 255, 0.8); line-height: 1.5; }
      button {
        margin-top: 0.75rem;
        border: 0;
        border-radius: 0.75rem;
        background: #ffffff;
        color: #284b63;
        font: inherit;
        font-weight: 600;
        padding: 0.75rem 1.5rem;
      }
    </style>
  </head>
  <body>
    <img src="/icons/icon-192.png" alt="FamilyHQ" />
    <h1>Sin conexión</h1>
    <p>No pudimos conectar con FamilyHQ. Revisa tu internet y vuelve a intentarlo.</p>
    <button type="button" onclick="location.reload()">Reintentar</button>
